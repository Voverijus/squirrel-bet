<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Squirrel Slots</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14; --deep:#0d1220; --border:#1e2d47; --inner:#050810;
  --gold:#f5c842; --gold2:#e8a020; --amber:#ff8c00;
  --green:#22c55e; --red:#ef4444; --cyan:#22d3ee; --violet:#a78bfa;
  --txt:#e2e8f0; --muted:#4e6080;
  /* line colours: 1=center=gold, 2=top=cyan, 3=bottom=violet */
  --lc1:#f5c842; --lc2:#22d3ee; --lc3:#a78bfa;
  --px:'Press Start 2P',monospace;
}
html,body{min-height:100vh;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--px);color:var(--txt);padding:12px;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.13) 2px,rgba(0,0,0,.13) 4px);pointer-events:none;z-index:999;}

/* ── MACHINE ─────────────────────────────── */
.machine{
  width:min(500px,100%);
  background:var(--deep);
  border:3px solid #253550;
  border-radius:14px;
  box-shadow:0 0 0 1px rgba(245,200,66,.1), 0 0 50px rgba(245,200,66,.07), 0 32px 80px rgba(0,0,0,.85);
  overflow:hidden;
}

/* ── MARQUEE ─────────────────────────────── */
.marquee{background:#000;border-bottom:2px solid #1a2840;padding:12px 16px 9px;text-align:center;}
.mq-lights{display:flex;justify-content:center;margin-bottom:8px;}
.ml{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 6px var(--gold);margin:0 5px;animation:mlb 1s infinite;}
.ml:nth-child(odd){animation-delay:.5s}
@keyframes mlb{0%,100%{opacity:1}50%{opacity:.15;box-shadow:none;}}
.mq-title{font-size:clamp(8px,3vw,12px);color:var(--gold);letter-spacing:4px;text-shadow:0 0 14px var(--gold),0 0 30px var(--gold2);animation:tpulse 2.2s ease-in-out infinite;}
@keyframes tpulse{0%,100%{text-shadow:0 0 14px var(--gold),0 0 30px var(--gold2);}50%{text-shadow:0 0 4px var(--gold);}}

/* ── BODY ─────────────────────────────────── */
.body{padding:14px 14px 16px;}

/* ── SCREEN ───────────────────────────────── */
.screen{background:#000;border:2px solid #1a2840;border-radius:8px;padding:10px;margin-bottom:12px;box-shadow:inset 0 0 50px rgba(0,0,0,.95);}

/* stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;}
.stat{background:var(--inner);border:1px solid #1e3050;border-radius:5px;padding:7px 4px;text-align:center;}
.slb{display:block;font-size:clamp(5px,1.5vw,6px);color:var(--muted);margin-bottom:5px;letter-spacing:1px;}
.svl{display:block;font-size:clamp(8px,2.3vw,11px);color:var(--gold);text-shadow:0 0 8px var(--gold2);}
.svl.coins{color:var(--cyan);text-shadow:0 0 8px rgba(34,211,238,.45);}
.svl.win  {color:var(--green);text-shadow:0 0 8px rgba(34,197,94,.45);}
.svl.tbet {color:var(--amber);text-shadow:0 0 8px rgba(255,140,0,.35);}

/* msg */
.msg{font-size:clamp(6px,1.7vw,8px);text-align:center;height:19px;line-height:19px;margin-bottom:8px;letter-spacing:2px;color:var(--muted);}
.msg.win   {color:var(--gold);text-shadow:0 0 10px var(--gold2);animation:mpop .4s ease;}
.msg.jackpot{animation:rainbow .4s infinite;}
.msg.lose  {color:var(--red);}
@keyframes mpop{0%{transform:scale(.82)}60%{transform:scale(1.07)}100%{transform:scale(1)}}
@keyframes rainbow{0%{color:var(--gold)}33%{color:var(--green)}66%{color:var(--cyan)}100%{color:var(--gold)}}

/* ── REEL AREA ────────────────────────────── */
.reel-area{display:flex;align-items:stretch;gap:0;}

/* side labels: 3 rows, each 70px tall */
.side-labels{display:flex;flex-direction:column;width:20px;flex-shrink:0;padding:9px 0;}
.slab{
  height:70px;display:flex;align-items:center;justify-content:center;
  font-size:8px;color:var(--muted);
  transition:color .25s, text-shadow .25s;
}
/* center = line 1, top = line 2, bottom = line 3 */
.slab.lc1{order:2;} /* center row */
.slab.lc2{order:1;} /* top row */
.slab.lc3{order:3;} /* bottom row */
.slab.lc1.on{color:var(--lc1);text-shadow:0 0 8px var(--lc1);}
.slab.lc2.on{color:var(--lc2);text-shadow:0 0 8px var(--lc2);}
.slab.lc3.on{color:var(--lc3);text-shadow:0 0 8px var(--lc3);}

/* reels wrap */
.reels-wrap{
  flex:1;display:flex;gap:5px;
  background:#020408;border:2px solid #0d1828;
  border-radius:6px;padding:9px 7px 7px;
  position:relative;
}

/* payline overlay lines */
.plo{position:absolute;inset:0;pointer-events:none;z-index:5;}
.pl{
  position:absolute;left:0;right:0;height:2px;
  opacity:0;transition:opacity .3s;
}
/* rows inside reels-wrap (padding-top=9px, sym-height=70px) */
.pl.top   {top:calc(9px + 35px - 1px); background:var(--lc2);} /* top row center */
.pl.mid   {top:calc(9px + 70px + 35px - 1px); background:var(--lc1);} /* center row */
.pl.bot   {top:calc(9px + 140px + 35px - 1px); background:var(--lc3);} /* bottom row */
.pl.active{opacity:.3;}
.pl.flash {opacity:1 !important;animation:plflash .28s infinite;}
@keyframes plflash{0%,100%{opacity:1;box-shadow:0 0 10px currentColor;}50%{opacity:.15;box-shadow:none;}}

.reel{flex:1;height:210px;overflow:hidden;border:1px solid #0d1828;border-radius:4px;background:#010306;}
.reel-inner{display:flex;flex-direction:column;align-items:center;will-change:transform;}
.sym{width:100%;height:70px;display:flex;align-items:center;justify-content:center;font-size:clamp(26px,6.5vw,34px);flex-shrink:0;border-bottom:1px solid #07101c;}
.sym.w{animation:swin .5s ease-out forwards;}
@keyframes swin{0%{transform:scale(1);filter:none;}40%{transform:scale(1.32);filter:drop-shadow(0 0 8px gold);}100%{transform:scale(1.16);filter:drop-shadow(0 0 5px gold);}}

/* history */
.history{display:flex;gap:3px;margin-top:9px;flex-wrap:wrap;justify-content:center;}
.hd{width:7px;height:7px;border-radius:50%;background:#1a2840;}
.hd.hw{background:var(--gold);}
.hd.hb{background:var(--cyan);opacity:.45;}
.hd.hl{background:#141e30;}

/* ── PAYTABLE ─────────────────────────────── */
.paytable{
  background:var(--inner);border:1px solid #1e3050;border-radius:7px;
  padding:10px 12px;margin-bottom:12px;
}
.pt-ttl{color:var(--muted);letter-spacing:2px;margin-bottom:8px;font-size:clamp(5px,1.4vw,6px);}
.pt-row{display:flex;align-items:center;padding:4px 0;border-bottom:1px solid #0d1828;}
.pt-row:last-child{border-bottom:none;}
.pt-syms{font-size:clamp(13px,3.2vw,17px);width:62px;flex-shrink:0;white-space:nowrap;letter-spacing:-1px;}
.pt-lbl{color:var(--muted);flex:1;font-size:clamp(5px,1.4vw,6px);letter-spacing:1px;}
.pt-val{font-size:clamp(6px,1.6vw,7px);color:var(--gold);font-weight:bold;}
.pt-val.jkp{color:var(--amber);text-shadow:0 0 8px rgba(255,140,0,.5);}

/* ── CONTROLS ─────────────────────────────── */
.controls{display:flex;flex-direction:column;gap:8px;}

/* grouped control panel */
.ctrl-panel{
  background:var(--inner);
  border:1px solid #1e3050;
  border-radius:8px;
  overflow:hidden;
}

/* top half: lines + auto side by side */
.ctrl-top{
  display:flex;
  border-bottom:1px solid #1e3050;
}
.ctrl-half{
  flex:1;
  padding:9px 10px 8px;
  display:flex;flex-direction:column;gap:6px;
}
.ctrl-half:first-child{
  border-right:1px solid #1e3050;
}

/* bottom half: bet */
.ctrl-bot{
  padding:9px 10px 10px;
  display:flex;flex-direction:column;gap:6px;
}

.ctrl-lbl{
  font-size:clamp(5px,1.4vw,6px);
  color:var(--muted);
  letter-spacing:2px;
  text-align:center;
}

/* chip strip */
.cstrip{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;}

/* base chip */
.chip{
  padding:5px 8px;
  border:1px solid #253550;
  border-radius:5px;
  background:#080e1c;
  color:#4e6080;
  font-family:var(--px);
  font-size:clamp(5px,1.5vw,7px);
  cursor:pointer;
  transition:all .15s;
  letter-spacing:.5px;
  white-space:nowrap;
}
.chip:hover:not([disabled]){border-color:var(--gold2);color:var(--gold2);}
.chip[disabled]{opacity:.35;cursor:not-allowed;}

/* active variants */
.chip.bet-chip.on  {border-color:var(--gold);  background:rgba(245,200,66,.1); color:var(--gold);  box-shadow:0 0 8px rgba(245,200,66,.25);}
.chip.line-chip.on {border-color:var(--cyan);  background:rgba(34,211,238,.08);color:var(--cyan);  box-shadow:0 0 8px rgba(34,211,238,.2);}
.chip.auto-chip.on {border-color:var(--violet);background:rgba(167,139,250,.08);color:var(--violet);box-shadow:0 0 8px rgba(167,139,250,.2);}

/* ── SPIN ROW ────────────────────────────── */
.spin-row{display:flex;gap:8px;}

.spin-btn{
  flex:1;
  background:linear-gradient(175deg,#c04800 0%,#6e2800 100%);
  border:none;border-bottom:5px solid #3a1400;
  border-radius:9px;color:#fff;
  font-family:var(--px);font-size:clamp(9px,2.2vw,11px);
  cursor:pointer;letter-spacing:2px;padding:15px 10px;
  text-shadow:0 2px 4px #000;
  transition:transform .08s,border-bottom-width .08s,box-shadow .15s;
  box-shadow:0 0 24px rgba(200,80,0,.35);
  position:relative;overflow:hidden;
}
.spin-btn::before{
  content:'';position:absolute;top:0;left:-80%;
  width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);
  animation:shim 3.2s infinite;
}
@keyframes shim{to{left:180%}}
.spin-btn:hover:not(:disabled){box-shadow:0 0 36px rgba(230,100,0,.6);}
.spin-btn:active:not(:disabled){transform:translateY(4px);border-bottom-width:1px;}
.spin-btn:disabled{opacity:.45;cursor:not-allowed;}

.stop-btn{
  display:none;padding:0 14px;
  background:transparent;
  border:2px solid var(--red);border-radius:9px;
  color:var(--red);font-family:var(--px);
  font-size:clamp(6px,1.6vw,8px);cursor:pointer;
  letter-spacing:1px;white-space:nowrap;
  animation:stoppulse 1s infinite;
}
.stop-btn.show{display:block;}
@keyframes stoppulse{0%,100%{box-shadow:0 0 8px rgba(239,68,68,.35);}50%{box-shadow:0 0 18px rgba(239,68,68,.75);}}

/* ── OVERLAY ─────────────────────────────── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:20px;}
.overlay.show{display:flex;}
.ov-title{font-size:clamp(14px,5vw,24px);color:var(--gold);text-align:center;animation:rainbow .4s infinite;line-height:1.7;}
.ov-sub{font-size:clamp(10px,3vw,14px);color:var(--green);text-shadow:0 0 14px rgba(34,197,94,.55);}
.ov-btn{margin-top:6px;background:transparent;border:2px solid var(--gold);color:var(--gold);font-family:var(--px);font-size:clamp(7px,2vw,9px);padding:11px 22px;cursor:pointer;border-radius:5px;letter-spacing:2px;animation:tpulse 1s infinite;}

.confetti{position:fixed;width:7px;height:7px;border-radius:2px;pointer-events:none;z-index:210;animation:cfall linear forwards;}
@keyframes cfall{0%{transform:translateY(-20px) rotate(0);opacity:1;}100%{transform:translateY(110vh) rotate(800deg);opacity:0;}}
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="ov-title" id="ov-title">🐿️ JACKPOT! 🐿️</div>
  <div class="ov-sub"  id="ov-sub">+500 COINS</div>
  <button class="ov-btn" onclick="closeOverlay()">▶ CONTINUE</button>
</div>

<div class="machine">

  <!-- marquee -->
  <div class="marquee">
    <div class="mq-lights">
      <div class="ml"></div><div class="ml"></div><div class="ml"></div>
      <div class="ml"></div><div class="ml"></div><div class="ml"></div>
      <div class="ml"></div><div class="ml"></div><div class="ml"></div>
    </div>
    <div class="mq-title">⋆ SQUIRREL SLOTS ⋆</div>
  </div>

  <div class="body">

    <!-- screen -->
    <div class="screen">

      <div class="stats">
        <div class="stat"><span class="slb">COINS</span><span class="svl coins" id="coins">1000</span></div>
        <div class="stat"><span class="slb">BET / LINE</span><span class="svl" id="bpl">5</span></div>
        <div class="stat"><span class="slb">TOTAL BET</span><span class="svl tbet" id="tbet">5</span></div>
        <div class="stat"><span class="slb">LAST WIN</span><span class="svl win" id="lwin">—</span></div>
      </div>

      <div class="msg" id="msg">PRESS SPIN TO PLAY</div>

      <!-- reel area: left labels | reels | right labels -->
      <div class="reel-area">

        <!-- LEFT labels — order: top=line2, center=line1, bottom=line3 -->
        <div class="side-labels" id="sll">
          <div class="slab lc2" data-side="l">2</div>
          <div class="slab lc1" data-side="l">1</div>
          <div class="slab lc3" data-side="l">3</div>
        </div>

        <div class="reels-wrap" id="reels-wrap">
          <!-- payline overlay: top, mid, bot rows -->
          <div class="plo">
            <div class="pl top" id="pl-top"></div>
            <div class="pl mid" id="pl-mid"></div>
            <div class="pl bot" id="pl-bot"></div>
          </div>
          <div class="reel"><div class="reel-inner" id="r0"></div></div>
          <div class="reel"><div class="reel-inner" id="r1"></div></div>
          <div class="reel"><div class="reel-inner" id="r2"></div></div>
        </div>

        <!-- RIGHT labels -->
        <div class="side-labels" id="slr">
          <div class="slab lc2">2</div>
          <div class="slab lc1">1</div>
          <div class="slab lc3">3</div>
        </div>

      </div><!-- /reel-area -->

      <div class="history" id="history"></div>
    </div><!-- /screen -->

    <!-- paytable -->
    <div class="paytable">
      <div class="pt-ttl">PAYTABLE — PER ACTIVE LINE</div>
      <div class="pt-row">
        <span class="pt-syms">🐿️🐿️🐿️</span>
        <span class="pt-lbl">3 SQUIRRELS</span>
        <span class="pt-val jkp">×100 JACKPOT</span>
      </div>
      <div class="pt-row">
        <span class="pt-syms">🐰🐰🐰</span>
        <span class="pt-lbl">3 RABBITS</span>
        <span class="pt-val">×10</span>
      </div>
      <div class="pt-row">
        <span class="pt-syms">🦔🦔🦔</span>
        <span class="pt-lbl">3 HEDGEHOGS</span>
        <span class="pt-val">×5</span>
      </div>
      <div class="pt-row">
        <span class="pt-syms">🐭🐭🐭</span>
        <span class="pt-lbl">3 MICE</span>
        <span class="pt-val">×3</span>
      </div>
      <div class="pt-row">
        <span class="pt-syms">🐿️</span>
        <span class="pt-lbl">ANY SQUIRREL ON LINE</span>
        <span class="pt-val">×1 BACK</span>
      </div>
    </div>

    <!-- controls -->
    <div class="controls">

      <!-- unified panel -->
      <div class="ctrl-panel">

        <!-- top: LINES left | AUTO right -->
        <div class="ctrl-top">
          <div class="ctrl-half">
            <div class="ctrl-lbl">LINES</div>
            <div class="cstrip" id="line-chips">
              <button class="chip line-chip on" data-lines="1">1</button>
              <button class="chip line-chip"    data-lines="2">2</button>
              <button class="chip line-chip"    data-lines="3">3</button>
            </div>
          </div>
          <div class="ctrl-half">
            <div class="ctrl-lbl">AUTO SPIN</div>
            <div class="cstrip" id="auto-chips">
              <button class="chip auto-chip" data-auto="10">×10</button>
              <button class="chip auto-chip" data-auto="20">×20</button>
              <button class="chip auto-chip" data-auto="50">×50</button>
            </div>
          </div>
        </div>

        <!-- bottom: BET -->
        <div class="ctrl-bot">
          <div class="ctrl-lbl">BET PER LINE</div>
          <div class="cstrip" id="bet-chips">
            <!-- filled by JS -->
          </div>
        </div>

      </div><!-- /ctrl-panel -->

      <!-- spin row -->
      <div class="spin-row">
        <button class="spin-btn" id="spin-btn">▶ SPIN</button>
        <button class="stop-btn" id="stop-btn">■ STOP</button>
      </div>

    </div><!-- /controls -->

  </div><!-- /body -->
</div><!-- /machine -->

<script>
// ── SYMBOL POOL ──────────────────────────────────────────
const POOL = [
  {id:'squirrel',e:'🐿️',w:5}, {id:'rabbit',  e:'🐰',w:10},
  {id:'hedgehog',e:'🦔',w:18},{id:'mouse',   e:'🐭',w:24},
  {id:'f1',e:'🍂',w:11},{id:'f2',e:'🌰',w:11},
  {id:'f3',e:'🍁',w:11},{id:'f4',e:'🪺',w:10},
];
const WHEEL=[];
POOL.forEach(s=>{for(let i=0;i<s.w;i++)WHEEL.push(s);});
function randSym(){return WHEEL[Math.floor(Math.random()*WHEEL.length)];}

// ── PAYLINE DEFINITION ──────────────────────────────────
// Row indices within reelGrid[reel]: 0=top, 1=center, 2=bottom
// Line 1 = center (row 1) — always active
// Line 2 adds top (row 0)
// Line 3 adds bottom (row 2)
const LINE_ROWS = {1:[1], 2:[1,0], 3:[1,0,2]};

// Map row index → payline DOM element
const PL_EL = {0:'pl-top', 1:'pl-mid', 2:'pl-bot'};

// ── EVALUATE ONE LINE ─────────────────────────────────────
function evalLine(a,b,c){
  if(a.id===b.id&&b.id===c.id){
    if(a.id==='squirrel') return {mult:100,label:'🐿️ JACKPOT!',type:'jackpot'};
    if(a.id==='rabbit')   return {mult:10, label:'3 RABBITS ×10',type:'win'};
    if(a.id==='hedgehog') return {mult:5,  label:'3 HEDGEHOGS ×5',type:'win'};
    if(a.id==='mouse')    return {mult:3,  label:'3 MICE ×3',type:'win'};
  }
  if([a,b,c].some(s=>s.id==='squirrel')) return {mult:1,label:'SQUIRREL — MONEY BACK',type:'refund'};
  return null;
}

// ── STATE ─────────────────────────────────────────────────
let coins      =1000;
let betPerLine =5;
let lines      =1;
let spinning   =false;
let autoLeft   =0;
let autoStop   =false;
const BET_OPTS =[1,2,5,10,25,50];

function totalBet(){return betPerLine*lines;}

// ── DOM ───────────────────────────────────────────────────
const coinsEl  =document.getElementById('coins');
const bplEl    =document.getElementById('bpl');
const tbetEl   =document.getElementById('tbet');
const lwinEl   =document.getElementById('lwin');
const msgEl    =document.getElementById('msg');
const spinBtn  =document.getElementById('spin-btn');
const stopBtn  =document.getElementById('stop-btn');
const histEl   =document.getElementById('history');
const strips   =[document.getElementById('r0'),document.getElementById('r1'),document.getElementById('r2')];
const betChips =document.getElementById('bet-chips');
const lineChips=document.getElementById('line-chips');
const autoChips=document.getElementById('auto-chips');

// payline elements
const plEls={top:document.getElementById('pl-top'),mid:document.getElementById('pl-mid'),bot:document.getElementById('pl-bot')};
// all side-label nodes
const allSlabs=document.querySelectorAll('.slab');

// ── BET CHIPS ─────────────────────────────────────────────
BET_OPTS.forEach(b=>{
  const btn=document.createElement('button');
  btn.className='chip bet-chip'+(b===betPerLine?' on':'');
  btn.textContent=b; btn.dataset.bet=b;
  btn.addEventListener('click',()=>{if(spinning)return; setBet(b);});
  betChips.appendChild(btn);
});
function setBet(b){
  betPerLine=b; bplEl.textContent=b; updateTbet();
  betChips.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',+c.dataset.bet===b));
}

// ── LINE CHIPS ────────────────────────────────────────────
lineChips.querySelectorAll('.chip').forEach(btn=>{
  btn.addEventListener('click',()=>{if(spinning)return; setLines(+btn.dataset.lines);});
});
function setLines(n){
  lines=n; updateTbet();
  lineChips.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',+c.dataset.lines===n));
  refreshPaylineVisuals(false);
}

function refreshPaylineVisuals(flash, winRows=[]){
  const activeRows = LINE_ROWS[lines]; // which row indices are active
  // top row (row 0): active when lines>=2
  // center row (row 1): always active when lines>=1
  // bottom row (row 2): active when lines>=3
  const rowActive={0:activeRows.includes(0), 1:activeRows.includes(1), 2:activeRows.includes(2)};

  // pl-top = row 0, pl-mid = row 1, pl-bot = row 2
  const plMap={0:plEls.top, 1:plEls.mid, 2:plEls.bot};
  [0,1,2].forEach(row=>{
    const el=plMap[row];
    el.classList.toggle('active', rowActive[row]);
    el.classList.remove('flash');
    if(flash && winRows.includes(row)) el.classList.add('flash');
  });

  // side label classes: lc1=center, lc2=top, lc3=bottom
  // slab with lc1 → row 1, lc2 → row 0, lc3 → row 2
  const rowClass={1:'lc1',0:'lc2',2:'lc3'};
  allSlabs.forEach(sl=>{
    // determine which row this label belongs to
    let row=-1;
    if(sl.classList.contains('lc1')) row=1;
    else if(sl.classList.contains('lc2')) row=0;
    else if(sl.classList.contains('lc3')) row=2;
    sl.classList.toggle('on', rowActive[row]);
  });
}
setLines(1); // init

// ── AUTO CHIPS ────────────────────────────────────────────
autoChips.querySelectorAll('.chip').forEach(btn=>{
  btn.addEventListener('click',()=>{
    if(spinning&&autoLeft>0) return;
    const n=+btn.dataset.auto;
    if(btn.classList.contains('on')){
      btn.classList.remove('on'); autoLeft=0;
    } else {
      autoChips.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
      btn.classList.add('on'); autoLeft=n;
    }
  });
});

function updateTbet(){tbetEl.textContent=totalBet();}
function updateUI(){coinsEl.textContent=coins;bplEl.textContent=betPerLine;updateTbet();}

// ── REEL STRIP BUILDER ────────────────────────────────────
const SYM_H=70, STRIP_LEN=30, LAND_BASE=25;
// strip row layout: LAND_BASE-1=top, LAND_BASE=center, LAND_BASE+1=bottom

let reelGrid=[[],[],[]]; // [reel][row]: 3 reels × 3 rows

function buildStrip(el, topS, midS, botS){
  el.innerHTML='';
  for(let i=0;i<STRIP_LEN;i++){
    const d=document.createElement('div');
    d.className='sym';
    d.textContent= i===LAND_BASE-1 ? topS.e
                 : i===LAND_BASE   ? midS.e
                 : i===LAND_BASE+1 ? botS.e
                 : randSym().e;
    el.appendChild(d);
  }
}
function yTop(idx){return -(idx*SYM_H);} // top row of visible window = strip index idx

function resetReel(el){
  buildStrip(el,randSym(),randSym(),randSym());
  el.style.transition='none';
  el.style.transform=`translateY(${yTop(1)}px)`;
  el.getBoundingClientRect();
}
strips.forEach(s=>resetReel(s));

// ── SPIN ──────────────────────────────────────────────────
spinBtn.addEventListener('click',()=>{
  if(autoLeft>0){runAuto();} else {doSpin();}
});
stopBtn.addEventListener('click',()=>{
  autoStop=true; autoLeft=0;
  autoChips.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  stopBtn.classList.remove('show');
  spinBtn.textContent='▶ SPIN';
});

async function runAuto(){
  if(spinning) return;
  autoStop=false;
  stopBtn.classList.add('show');
  while(autoLeft>0&&!autoStop&&coins>=totalBet()){
    spinBtn.textContent=`AUTO ${autoLeft}`;
    await doSpin();
    autoLeft--;
    if(autoLeft>0&&!autoStop) await sleep(380);
  }
  autoLeft=0; autoStop=false;
  autoChips.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  stopBtn.classList.remove('show');
  spinBtn.textContent='▶ SPIN';
}

async function doSpin(){
  if(spinning) return;
  if(coins<totalBet()){setMsg('NOT ENOUGH COINS','lose');return;}
  spinning=true; lockChips(true);
  refreshPaylineVisuals(false);
  setMsg('SPINNING...','');
  lwinEl.textContent='—';
  coins-=totalBet(); updateUI();

  // roll 3 rows per reel
  for(let r=0;r<3;r++) reelGrid[r]=[randSym(),randSym(),randSym()];

  strips.forEach((s,r)=>{
    const [t,m,b]=reelGrid[r];
    buildStrip(s,t,m,b);
    s.style.transition='none';
    s.style.transform=`translateY(${yTop(1)}px)`;
    s.getBoundingClientRect();
  });

  const DUR=[2000,2460,2960];
  const EASE='cubic-bezier(0.25,0.1,0.05,1.0)';
  const finalY=yTop(LAND_BASE-1); // top row of visible window → LAND_BASE-1

  strips.forEach((s,i)=>{
    setTimeout(()=>{
      s.style.transition=`transform ${DUR[i]}ms ${EASE}`;
      s.style.transform=`translateY(${finalY}px)`;
    },i*160);
  });

  await sleep(2*160+DUR[2]+120);
  onStop();
}

function onStop(){
  spinning=false; lockChips(false);

  const activeRows=LINE_ROWS[lines]; // e.g. [1] or [1,0] or [1,0,2]
  let totalWin=0, bestType=null, msgs=[], winRows=[];

  activeRows.forEach(row=>{
    // symbols for this row across all 3 reels
    const syms=[reelGrid[0][row], reelGrid[1][row], reelGrid[2][row]];
    const res=evalLine(syms[0],syms[1],syms[2]);
    if(res){
      const pay=betPerLine*res.mult;
      totalWin+=pay; msgs.push(res.label); winRows.push(row);
      if(!bestType||res.type==='jackpot'||(res.type==='win'&&bestType==='refund')) bestType=res.type;
      // highlight winning symbols
      // strip position: row 0→LAND_BASE-1, row 1→LAND_BASE, row 2→LAND_BASE+1
      const stripIdx=LAND_BASE-1+row;
      strips.forEach(s=>{
        const el=s.querySelectorAll('.sym')[stripIdx];
        if(el) el.classList.add('w');
      });
    }
  });

  if(totalWin>0){
    coins+=totalWin; updateUI();
    lwinEl.textContent=(bestType==='refund'&&msgs.length===1)?'±0':'+'+totalWin;
    refreshPaylineVisuals(true, winRows);
    const display=msgs.length>1?`${msgs.length} LINES! +${totalWin}`:msgs[0];
    if(bestType==='jackpot'){
      setMsg('🐿️ JACKPOT! 🐿️','jackpot');
      setTimeout(()=>showOverlay('🐿️ JACKPOT! 🐿️',`+${totalWin} COINS!`),400);
      confetti(80);
    } else {
      setMsg(display,'win');
      if(totalWin>=betPerLine*10) confetti(28);
    }
    addHist('hw');
  } else {
    setMsg('NO MATCH — TRY AGAIN','lose');
    addHist('hl');
    if(coins<=0) setTimeout(()=>{coins=1000;updateUI();setMsg('RELOADED! +1000 COINS','win');},1600);
  }
}

// ── HELPERS ───────────────────────────────────────────────
function lockChips(lock){
  betChips.querySelectorAll('.chip').forEach(c=>lock?c.setAttribute('disabled',''):c.removeAttribute('disabled'));
  lineChips.querySelectorAll('.chip').forEach(c=>lock?c.setAttribute('disabled',''):c.removeAttribute('disabled'));
  spinBtn.disabled=lock;
}

const HIST_MAX=28; let histArr=[];
function addHist(cls){
  histArr.push(cls); if(histArr.length>HIST_MAX) histArr.shift();
  histEl.innerHTML=histArr.map(c=>`<div class="hd ${c}"></div>`).join('');
}

function setMsg(t,cls){msgEl.textContent=t; msgEl.className='msg'+(cls?' '+cls:'');}

function showOverlay(title,sub){
  document.getElementById('ov-title').textContent=title;
  document.getElementById('ov-sub').textContent=sub;
  document.getElementById('overlay').classList.add('show');
}
function closeOverlay(){
  document.getElementById('overlay').classList.remove('show');
  document.querySelectorAll('.confetti').forEach(e=>e.remove());
}

function confetti(n){
  const cols=['#f5c842','#ff8c00','#22c55e','#22d3ee','#ef4444','#a78bfa'];
  for(let i=0;i<n;i++){
    const el=document.createElement('div'); el.className='confetti';
    el.style.cssText=`left:${Math.random()*100}vw;background:${cols[i%cols.length]};animation-duration:${1.2+Math.random()*2}s;animation-delay:${Math.random()*.7}s`;
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>el.remove());
  }
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
</script>
